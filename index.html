    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <title>Previsão do tempo</title>
</head>
<body>
    <div class="caixa-maior">
        <!-- INPUT é o campo onde o usuário vai digitar o texto 
              PLACEHOLDER é a dica que aparece em cinza para o usuário o que deve escrever no campo de texto -->
        <input class="input-cidade" placeholder="Digite a cidade">

        <button class="botao" onclick="cliqueiNoBotao()">
            <img src="./img/lupa.svg" alt="lupa" class="img-botao">
        </button>

        <button class="botao" onclick="detectaVoz()">
        <img src="./img/microfone.svg" alt="microfone" class="img-botao">
        </button>


        <div class="caixa-media">

        </div>


    </div>
    
</body>

<script src="scripts.js"></script>

</html>
